apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: horse-racing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: backend
          image: hyun9409194091/horse-racing-backend:sha-e7ee9bf
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_PATH
              value: /data/database.sqlite
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: ADMIN_TOKEN
                  optional: true
            - name: QCC_WITHDRAW_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: QCC_WITHDRAW_PRIVATE_KEY
                  optional: true
            - name: QCC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: QCC_API_URL
                  optional: true
            - name: QCC_EXPLORER_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: QCC_EXPLORER_URL
                  optional: true
            - name: QCC_DEPOSIT_WALLET
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: QCC_DEPOSIT_WALLET
                  optional: true
            - name: QCC_WITHDRAW_FROM_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: QCC_WITHDRAW_FROM_ADDRESS
                  optional: true
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: backend-sqlite-pvc
