apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: horse-racing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: frontend
          image: hyun9409194091/horse-racing-frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            # Keep empty to use same-origin (/api, /socket.io) via ingress.
            - name: NEXT_PUBLIC_BACKEND_URL
              value: ""
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
